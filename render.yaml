services:
  - type: web
    name: pulse-blog
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn pulse_blog.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: pulse-blog-db
          property: connectionString

databases:
  - name: pulse-blog-db
    plan: free
